<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="Pip's Peril — an original retro 8-bit side-scrolling platformer." />
  <title>Pip's Peril</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }
    #game {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <script>
    // Capture uncaught errors for diagnostics (readable as window.__errors).
    window.__errors = [];
    window.addEventListener('error', function (e) {
      window.__errors.push(String((e.error && e.error.stack) || e.message));
    });
    window.addEventListener('unhandledrejection', function (e) {
      window.__errors.push('unhandledrejection: ' + String(e.reason));
    });
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
